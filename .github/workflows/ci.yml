name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  build-test:
    name: Build, lint, and test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Build documentation
        run: cargo doc --workspace --no-deps --locked

      - name: Compile fuzz targets
        run: cargo check --manifest-path fuzz/Cargo.toml --bins --locked

  msrv:
    name: Minimum supported Rust 1.88
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Check workspace at MSRV
        run: |
          cargo check --workspace --all-targets --locked
          cargo check --manifest-path fuzz/Cargo.toml --bins --locked

  supply-chain:
    name: Supply-chain policy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit and cargo-deny
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Check RustSec advisories
        run: |
          cargo audit --deny warnings
          cargo audit --file fuzz/Cargo.lock --no-fetch --deny warnings

      - name: Check licenses, bans, and sources
        run: |
          cargo deny check licenses bans sources
          cargo deny --manifest-path fuzz/Cargo.toml --config fuzz/deny.toml check licenses bans sources

  release-candidate:
    name: Release candidate packaging
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Verify packaging policy
        run: scripts/verify-packaging.sh

      - name: Verify and build reproducible archive
        env:
          PANOSMCP_OUTPUT_DIR: ${{ github.workspace }}/dist
        run: scripts/verify-reproducible-build.sh

      - name: Smoke release binary
        run: |
          mkdir -p "$RUNNER_TEMP/rust-panosmcp-rc"
          tar -xzf dist/*.tar.gz -C "$RUNNER_TEMP/rust-panosmcp-rc"
          "$RUNNER_TEMP"/rust-panosmcp-rc/*/bin/rust-panosmcp --version

      - name: Build hardened container
        run: |
          docker build \
            --build-arg VERSION=0.2.0 \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --tag rust-panosmcp:ci .
          test "$(docker image inspect --format '{{.Config.User}}' rust-panosmcp:ci)" = "65532:65532"
          docker run --rm --read-only --cap-drop=ALL \
            --security-opt=no-new-privileges rust-panosmcp:ci --version

      - name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: rust-panosmcp-release-candidate
          path: dist/*
          if-no-files-found: error
